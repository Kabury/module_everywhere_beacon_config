moev-maximum-productivity=Maximum Productivity
moev-module-extra=Bonus slot count
moev-allow-surface=Surface effects


[mod-setting-description]
moev-allow-recipe=Changes the recipes to allow all types of effects.
moev-allow-cat=Will add these module categories to every single modified entity. \n Defaults to vanilla categories. \n If space age is enabled, quality modules are autohandled
moev-allow-catmax=Will make ALL modules, even those from mods, be usable in all modified entities.
moev-allow-entity=Changes entities to allow all types of effects. \n Needs to be active for any of the below to work.

moev-allow-beac=Allow all module effects on all beacon type structures.
moev-profile=Changes how effective additional beacons are. \n Defaults to 2.0 mechanics. \n Set to 1,0 to only allow one beacon to affect each machine. \n Dev description: \n Extra multiplier applied to the effects received from beacon by the effect receiver based on amount of beacons that are in range of that effect receiver. If there are more beacons that reach the effect receiver than there are entries in this array, then the last entry in the array is used for the multiplier.
moev-allow-asem=Allow all module effects on all assembler type structures.
moev-allow-silo=Allow all module effects on all rocket-silo type structures.
moev-allow-furn=Allow all module effects on all furnace type structures.
moev-allow-lab=Allow all module effects on all research lab type structures.
moev-allow-dril=Allow all module effects on all drill type structures.

moev-maximum-productivity=Change all recipes to have this productivity cap. \n Set to 3 for 300% prod. \n Setting it to 0 will leave them unchanged.
moev-module-extra=Gives all entities this many extra bonus module slot. \n Setting 0 will leave them unchanged.
moev-allow-surface=Allow all entities to be affected by surface effects.
